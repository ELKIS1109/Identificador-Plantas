<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificador de Plantas by Mora Jr-1109</title>
    <style>
        /* --- RESET Y BASES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary-nature: #1a531c; /* Verde bosque oscuro */
            --accent-leaf: #79ac78;    /* Verde hoja suave */
            --text-dark: #2c3e50;
            --white-glass: rgba(255, 255, 255, 0.85);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
            position: relative;
            padding: 20px;
            /* IMAGEN DE FONDO DE NATURALEZA */
            background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1920'); /* Un bosque exuberante */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Capa oscura superpuesta al fondo para mejorar contraste */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        /* --- CONTENEDOR PRINCIPAL (Efecto Cristal) --- */
        .container {
            background: var(--white-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            width: 95%;
            max-width: 480px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.4);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* Decoración orgánica de fondo dentro del contenedor */
        .container::after {
            content: '🌿';
            position: absolute;
            bottom: -20px;
            right: -10px;
            font-size: 100px;
            opacity: 0.08;
            transform: rotate(-15deg);
        }

        /* --- CABECERA --- */
        h1 {
            color: var(--primary-nature);
            font-size: 2rem;
            margin-bottom: 5px;
            font-weight: 800;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }

        .author {
            font-size: 0.9rem;
            color: #57606f;
            margin-bottom: 30px;
            display: block;
            font-weight: 600;
        }

        /* --- ZONA DE SUBIDA --- */
        .upload-card {
            background: rgba(255, 255, 255, 0.6);
            border: 3px dashed var(--accent-leaf);
            border-radius: 25px;
            padding: 40px 20px;
            margin-bottom: 25px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            position: relative;
        }

        .upload-card:hover {
            border-color: var(--primary-nature);
            background: rgba(240, 255, 244, 0.8);
            transform: scale(1.02);
        }

        #preview {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 20px;
            display: none;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 4px solid white;
        }

        .icon-big {
            font-size: 60px;
            margin-bottom: 15px;
            display: block;
        }

        .upload-text {
            font-weight: 600;
            color: var(--primary-nature);
        }

        /* --- BOTÓN --- */
        .btn {
            background: linear-gradient(135deg, var(--accent-leaf) 0%, var(--primary-nature) 100%);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 6px 15px rgba(26, 83, 28, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            box-shadow: 0 8px 20px rgba(26, 83, 28, 0.6);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #aab7aa;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* --- ESTADOS --- */
        .loading {
            display: none;
            margin-top: 25px;
            font-weight: bold;
            color: var(--primary-nature);
            font-size: 1.1rem;
        }

        /* Animación de pulso para la carga */
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        .loading span { animation: pulse 1.5s infinite; }

        /* --- RESULTADOS --- */
        #result {
            margin-top: 35px;
            text-align: left;
            display: none;
            animation: slideUp 0.6s ease-out;
        }

        .results-header {
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--primary-nature);
            font-size: 1.2rem;
            border-bottom: 2px solid var(--accent-leaf);
            padding-bottom: 5px;
        }

        .result-item {
            background: white;
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .result-item:hover { transform: translateX(5px); }

        /* Pequeña decoración botánica en cada resultado */
        .result-item::after {
            content: '🍃';
            position: absolute;
            top: 10px;
            right: 10px;
            opacity: 0.2;
        }

        .common-name {
            color: var(--primary-nature);
            font-size: 1.25rem;
            font-weight: 700;
            text-transform: capitalize;
        }

        .scientific-name {
            font-style: italic;
            color: #7f8c8d;
            margin-bottom: 8px;
            display: block;
        }

        .confidence-bar-container {
            background: #eee;
            border-radius: 10px;
            height: 8px;
            width: 100%;
            margin-top: 10px;
        }

        .confidence-bar-fill {
            background: var(--accent-leaf);
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Identificador de Plantas</h1>
        <span class="author">by Mora Jr-1109</span>
    </header>

    <div class="upload-card" onclick="document.getElementById('fileInput').click()" id="uploadCard">
        <div id="dropZoneContent">
            <span class="icon-big">🌳</span>
            <p class="upload-text">Toca para subir o tomar una foto</p>
            <p style="font-size: 0.85rem; color: #7f8c8d; margin-top:5px;">(Árboles, flores, hojas, frutos)</p>
        </div>
        <img id="preview" alt="Vista previa de tu planta">
        <input type="file" id="fileInput" accept="image/*" hidden onchange="handleFile(event)">
    </div>

    <button id="identifyBtn" class="btn" onclick="startIdentification()" disabled>Analizar Naturaleza</button>

    <div id="loader" class="loading"><span>🌲 Consultando a la IA... 🌸</span></div>

    <div id="result">
        <p class="results-header">Principales Coincidencias:</p>
        <div id="resultContent"></div>
    </div>
</div>

<script>
    /** * ==========================================
     * PEGA TU API KEY DE PL@NTNET AQUÍ ABAJO 
     * ==========================================
     */
    const API_KEY = "2b10V3sEBz538iYKiIiCpqX3"; 

    function handleFile(event) {
        const file = event.target.files[0];
        if (file) {
            const preview = document.getElementById('preview');
            const dropZoneContent = document.getElementById('dropZoneContent');
            const btn = document.getElementById('identifyBtn');
            const uploadCard = document.getElementById('uploadCard');
            
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            dropZoneContent.style.display = 'none';
            btn.disabled = false;
            
            // Ajustar el padding de la tarjeta al mostrar la imagen
            uploadCard.style.padding = "10px";
        }
    }

    async function startIdentification() {
        const fileInput = document.getElementById('fileInput');
        const loader = document.getElementById('loader');
        const resultDiv = document.getElementById('result');
        const resultContent = document.getElementById('resultContent');
        const btn = document.getElementById('identifyBtn');

        if (!fileInput.files[0]) return;

        // Limpiar estados anteriores
        loader.style.display = 'block';
        resultDiv.style.display = 'none';
        resultContent.innerHTML = '';
        btn.disabled = true;
        btn.innerText = "Analizando...";

        const formData = new FormData();
        formData.append('images', fileInput.files[0]);
        formData.append('organs', 'auto'); 

        try {
            // URL de la API de Pl@ntNet
            const apiUrl = `https://my-api.plantnet.org/v2/identify/all?api-key=${API_KEY}`;
            
            const response = await fetch(apiUrl, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                if(response.status === 404) {
                    throw new Error('No se reconoció ninguna planta en la imagen.');
                } else {
                    throw new Error('Error en la comunicación con la API.');
                }
            }

            const data = await response.json();
            displayResults(data.results);
        } catch (error) {
            alert('Aviso: ' + error.message);
            console.error(error);
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
            btn.innerText = "Analizar Naturaleza";
        }
    }

    function displayResults(results) {
        const resultDiv = document.getElementById('result');
        const resultContent = document.getElementById('resultContent');

        if (!results || results.length === 0) {
            resultContent.innerHTML = '<p style="padding:15px;">No se encontraron coincidencias confiables.</p>';
            resultDiv.style.display = 'block';
            return;
        }

        // Mostrar las 3 mejores coincidencias
        results.slice(0, 3).forEach(res => {
            const item = document.createElement('div');
            item.className = 'result-item';
            
            const confidencePercentage = (res.score * 100).toFixed(1);
            
            // Pl@ntNet a veces no devuelve nombres comunes en español, usamos el científico como respaldo
            const commonName = res.species.commonNames && res.species.commonNames.length > 0 
                ? res.species.commonNames[0] 
                : scientificName;
            
            const scientificName = res.species.scientificNameWithoutAuthor;

            item.innerHTML = `
                <div>
                    <span class="common-name">${commonName}</span>
                    <span class="scientific-name">${scientificName}</span>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                        <span style="font-size:0.9rem; font-weight:600; color:#57606f;">Confianza: ${confidencePercentage}%</span>
                    </div>
                    <div class="confidence-bar-container">
                        <div class="confidence-bar-fill" style="width: ${confidencePercentage}%"></div>
                    </div>
                </div>
            `;
            resultContent.appendChild(item);
        });

        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>
